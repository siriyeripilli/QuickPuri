<!DOCTYPE html>
<html>
<head>
    <title>Student Order</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Student Order Page</h2>

<div class="menu">

    <div class="item">
        <img src="images/panipuri.png">
        <p>Pani Puri – ₹30</p>
        <input type="checkbox" value="Pani Puri">
        Qty: <input type="number" min="1" value="1">
    </div>

    <div class="item">
        <img src="images/masalapuri.png">
        <p>Masala Puri – ₹40</p>
        <input type="checkbox" value="Masala Puri">
        Qty: <input type="number" min="1" value="1">
    </div>

    <div class="item">
        <img src="images/dahipuri.png">
        <p>Dahi Puri – ₹50</p>
        <input type="checkbox" value="Dahi Puri">
        Qty: <input type="number" min="1" value="1">
    </div>

    <div class="item">
        <img src="images/amaravathi.png">
        <p>Amaravathi – ₹35</p>
        <input type="checkbox" value="Amaravathi">
        Qty: <input type="number" min="1" value="1">
    </div>

    <div class="item">
        <img src="images/murimixture.png">
        <p>Muri Mixture – ₹20</p>
        <input type="checkbox" value="Muri Mixture">
        Qty: <input type="number" min="1" value="1">
    </div>

    <div class="item">
        <img src="images/chat.png">
        <p>Chat – ₹25</p>
        <input type="checkbox" value="Chat">
        Qty: <input type="number" min="1" value="1">
    </div>

</div>

<br>

<label><b>Bus Stop:</b></label><br>
<input type="text" id="stop" placeholder="Enter bus stop"><br><br>
<label>Bus Arrival Time (approx):</label><br>
<select id="eta">
    <option value="10">10 minutes</option>
    <option value="15">15 minutes</option>
    <option value="20">20 minutes</option>
    <option value="30">30 minutes</option>
</select>
<br><br>

<button onclick="placeOrder()">Place Order</button>

<p id="msg"></p>

<script src="js/app.js"></script>
</body>
</html>
